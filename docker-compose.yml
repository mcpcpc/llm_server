services:

  vllm:
    image: nvcr.io/nvidia/vllm:26.04-py3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - VLLM_USE_V1_ENGINE=1
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./fixed_chat_template.jinja:/app/fixed_chat_template.jinja
    command: >
      vllm serve Qwen/Qwen3.6-35B-A3B-FP8
      --host 0.0.0.0
      --max-model-len 262144
      --max-num-seqs 4
      --max-num-batched-tokens 16384
      --gpu-memory-utilization 0.8
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --load-format fastsafetensors
      --attention-backend flashinfer
      --moe-backend triton
      --optimization-level 3
      --enable-prefix-caching
      --mamba-cache-mode align
      --chat-template /app/fixed_chat_template.jinja
      --default-chat-template-kwargs '{"preserve_thinking":true}'
      --speculative-config '{"method":"dflash","model":"z-lab/Qwen3.6-35B-A3B-DFlash","num_speculative_tokens":15}'
      --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":0.0,"repetition_penalty":1.0}'
      --tensor-parallel-size 1
      --served-model-name qwen3.6-35b-a3b
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"   # expose directly only if needed for debugging; otherwise remove
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on:
      vllm:
        condition: service_healthy
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: >
      --config /app/config.yaml
      --port 4000
      --detailed_debug
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  huggingface_cache:
  postgres_data:
 